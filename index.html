<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Security headers (also set these on your server/Vercel) ── -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <!-- Permissions policy: disable APIs you don't use -->
    <meta http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=(), payment=()" />

    <!-- ── SEO & social ─────────────────────────────────────────── -->
    <title>Gohar Ali — Full Stack Developer</title>
    <meta name="description"
      content="Full Stack Developer crafting elegant, fast, and accessible digital products." />
    <meta name="theme-color" content="#0a0a0f" id="theme-color-meta" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Gohar Ali — Full Stack Developer" />
    <meta property="og:description" content="Full Stack Developer crafting elegant digital products." />
    <meta property="og:url"         content="https://yourdomain.com" />

    <!-- ── Performance: preconnect to font origins ──────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Fonts with display=swap prevents invisible text ──────── -->
    <!-- Only load weights actually used: 300, 400, 500, 600 for DM Sans; 400, 500 for Playfair -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo3.png" />

    <!--
      Anti-flash: synchronous inline script sets [data-theme] before
      React paints, preventing a flash of wrong theme.
      Must remain render-blocking — it's tiny (< 300 bytes).
    -->
    <script>
      (function(){
        var k='portfolio-theme',s,t;
        try{s=localStorage.getItem(k)}catch(e){}
        t=(s==='light'||s==='dark')?s:
          (window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
        document.documentElement.setAttribute('data-theme',t);
        var m=document.getElementById('theme-color-meta');
        if(m)m.content=t==='light'?'#f8f7f4':'#0a0a0f';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
